<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เข้าสู่ระบบเจ้าหน้าที่ - เทศบาลเมืองชุมแสง</title>
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="assets/images/logo.png">
    
    <!-- Tailwind CSS (CDN for prototype) -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- FontAwesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            green: '#15803d', /* green-700 */
                            navy: '#1e3a8a',  /* blue-900 */
                            light: '#f3f4f6', /* gray-100 */
                        }
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center p-4 selection:bg-brand-green selection:text-white relative overflow-hidden">

    <!-- Background Elements -->
    <div class="absolute top-0 left-0 w-full h-full overflow-hidden -z-10">
        <div class="absolute -top-40 -right-40 w-96 h-96 bg-brand-green opacity-10 rounded-full blur-3xl"></div>
        <div class="absolute -bottom-40 -left-40 w-96 h-96 bg-brand-navy opacity-10 rounded-full blur-3xl"></div>
    </div>

    <!-- Login Container -->
    <div class="relative w-full max-w-md bg-white rounded-3xl shadow-2xl overflow-hidden transform transition-all z-10">
        <!-- Header Section -->
        <div class="bg-gradient-to-r from-brand-navy to-brand-green p-8 text-center text-white">
            <div class="w-20 h-20 mx-auto bg-white rounded-full p-2 shadow-lg mb-4 flex items-center justify-center">
                <img src="assets/images/logo.png" alt="Logo" class="w-16 h-16 object-contain" onerror="this.onerror=null; this.src='https://via.placeholder.com/64?text=Logo';">
            </div>
            <h1 class="text-2xl font-bold mb-1 tracking-wide">เทศบาลเมืองชุมแสง</h1>
            <p class="text-sm text-green-100 font-medium">เข้าสู่ระบบ • เจ้าหน้าที่ภาคสนาม</p>
        </div>

        <!-- Form Section -->
        <div class="p-8">
            <div id="error-message" class="hidden mb-4 bg-red-50 border-l-4 border-red-500 p-3 rounded-md">
                <p class="text-sm text-red-700 flex items-center">
                    <i class="fas fa-exclamation-circle mr-2"></i> 
                    <span class="ml-1">ชื่อผู้ใช้หรือรหัสผ่านไม่ถูกต้อง</span>
                </p>
            </div>

            <form id="loginForm" class="space-y-6">
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">ชื่อผู้ใช้ (Username)</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <i class="fas fa-user text-gray-400"></i>
                        </div>
                        <input type="text" id="username" class="w-full pl-10 pr-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-brand-green focus:border-brand-green transition-shadow outline-none text-gray-800" required>
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">รหัสผ่าน (Password)</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <i class="fas fa-lock text-gray-400"></i>
                        </div>
                        <input type="password" id="password" class="w-full pl-10 pr-12 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-brand-green focus:border-brand-green transition-shadow outline-none text-gray-800" required>
                        <button type="button" id="togglePassword" class="absolute inset-y-0 right-0 pr-3 flex items-center text-gray-400 hover:text-brand-green focus:outline-none">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>

                <div class="flex items-center justify-between mt-2">
                    <label class="flex items-center text-sm text-gray-600 cursor-pointer">
                        <input type="checkbox" class="rounded border-gray-300 text-brand-green focus:ring-brand-green mr-2 cursor-pointer w-4 h-4">
                        จำการเข้าระบบ
                    </label>
                </div>

                <button type="submit" class="w-full bg-brand-green hover:bg-green-700 text-white font-bold py-3.5 px-4 rounded-xl shadow-lg hover:shadow-xl transition-all flex justify-center items-center group">
                    <span>เข้าสู่ระบบเจ้าหน้าที่</span>
                    <i class="fas fa-arrow-right ml-2 opacity-0 group-hover:opacity-100 transform -translate-x-2 group-hover:translate-x-0 transition-all font-light"></i>
                </button>
            </form>
            
            <div class="mt-6 text-center text-sm">
                <a href="index.html" class="text-brand-navy hover:underline"><i class="fas fa-home mr-1"></i>กลับหน้าแรก</a>
                <span class="mx-2 text-gray-300">|</span>
                <a href="admin_login.html" class="text-brand-navy hover:underline">สำหรับแอดมิน</a>
            </div>
            <p class="mt-4 text-center text-xs text-gray-400">© 2026 ระบบรับเรื่องร้องเรียน เทศบาลเมืองชุมแสง</p>
        </div>
    </div>

    <script>
        // Toggle password visibility
        const togglePassword = document.getElementById('togglePassword');
        const passwordInput = document.getElementById('password');

        togglePassword.addEventListener('click', function() {
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            this.innerHTML = type === 'password' ? '<i class="fas fa-eye"></i>' : '<i class="fas fa-eye-slash"></i>';
        });

        // Form Submission
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            const errorMsg = document.getElementById('error-message');

            // Simple demo credential logic
            if ((user === 'staff' && pass === '1234') || (user === 'staff' && pass === 'staff') || (user==='admin' && pass==='admin')) {
                // Success
                errorMsg.classList.add('hidden');
                
                const btn = this.querySelector('button[type="submit"]');
                const originalText = btn.innerHTML;
                btn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i> กำลังเข้าสู่ระบบ...';
                btn.classList.add('opacity-80', 'cursor-not-allowed');
                
                setTimeout(() => {
                    sessionStorage.setItem('staff_logged_in', 'true');
                    sessionStorage.setItem('staff_name', 'สมชาย (ทีมช่าง)');
                    window.location.href = 'staff.html';
                }, 800);
            } else {
                // Error
                errorMsg.classList.remove('hidden');
                
                // Clear password field
                passwordInput.value = '';
                passwordInput.focus();
            }
        });
    </script>
</body>
</html>
